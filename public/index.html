<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSA 10 Base Set Pokemon Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; font-size: 2rem; margin: 20px 0 8px; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 24px; font-size: 1rem; font-weight: 600; border: 2px solid #334155; border-radius: 8px; cursor: pointer; background: #1e293b; color: #94a3b8; transition: all 0.15s; }
    .tab-btn:hover { border-color: #f59e0b; color: #e2e8f0; }
    .tab-btn.active { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; border-color: #f59e0b; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Stats bar */
    .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 15px; }
    .stat { background: #1e293b; border-radius: 10px; padding: 12px 24px; text-align: center; min-width: 140px; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #fbbf24; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* Activity log */
    #logContainer { display: none; background: #0b1120; border: 1px solid #1e293b; border-radius: 10px; padding: 12px; margin-bottom: 20px; max-height: 200px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; line-height: 1.5; }
    .log-entry { padding: 2px 0; }
    .log-entry.error { color: #f87171; }
    .log-entry.info { color: #60a5fa; }
    .log-entry.success { color: #34d399; }
    .log-time { color: #475569; margin-right: 8px; }

    /* Tables */
    h2 { color: #fbbf24; margin: 25px 0 12px; font-size: 1.3rem; border-bottom: 2px solid #1e293b; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
    th { background: #1e293b; padding: 10px 8px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; position: sticky; top: 0; z-index: 1; }
    td { padding: 8px; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
    tr:hover td { background: #1e293b; }
    .price { font-weight: 600; color: #34d399; }
    .negative { color: #34d399; font-weight: 600; }
    .positive { color: #f87171; font-weight: 600; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 6px; }
    .badge-verified { background: #065f46; color: #34d399; }
    .badge-unverified { background: #7c2d12; color: #fb923c; }
    .badge-holo { background: #4c1d95; color: #c4b5fd; }
    .badge-rare { background: #1e3a5f; color: #93c5fd; }
    .badge-common { background: #1e293b; color: #94a3b8; }
    .badge-trainer { background: #713f12; color: #fcd34d; }
    .badge-energy { background: #064e3b; color: #6ee7b7; }
    .badge-hot { background: #7f1d1d; color: #fca5a5; }
    .empty { text-align: center; color: #64748b; padding: 30px; }
    .count-badge { background: #1e293b; color: #fbbf24; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-left: 10px; }
    #goBtn { display: block; margin: 0 auto 20px; padding: 12px 40px; font-size: 1rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(245,158,11,0.3); }
    #goBtn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(245,158,11,0.5); }
    #goBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .refresh-btn { padding: 8px 20px; font-size: 0.9rem; font-weight: 600; border: 2px solid #334155; border-radius: 8px; cursor: pointer; background: #1e293b; color: #94a3b8; margin: 0 auto 15px; display: block; }
    .refresh-btn:hover { border-color: #f59e0b; color: #e2e8f0; }
    .time-urgent { color: #f87171; font-weight: 700; }
    .time-warn { color: #fbbf24; font-weight: 600; }

    /* Mobile styles - horizontally scrollable tables */
    @media (max-width: 768px) {
      .container { padding: 6px; }
      h1 { font-size: 1.3rem; margin: 10px 0 4px; }
      .subtitle { font-size: 0.7rem; }
      #goBtn { padding: 8px 24px; font-size: 0.85rem; }
      h2 { font-size: 1rem; margin: 12px 0 6px; }
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { font-size: 0.7rem; min-width: 600px; }
      th { padding: 6px 4px; font-size: 0.65rem; white-space: nowrap; }
      td { padding: 5px 4px; font-size: 0.7rem; white-space: nowrap; }
      th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; background: #0f172a; }
      th:first-child { background: #1e293b; z-index: 3; }
      .badge { display: none; }
      .count-badge { font-size: 0.7rem; padding: 2px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PSA 10 Base Set Pokemon Scanner</h1>
    <p class="subtitle" id="lastScanInfo" style="color:#fbbf24;"></p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('deals')">Deals</button>
      <button class="tab-btn" onclick="switchTab('market')">Market Prices</button>
      <button class="tab-btn" onclick="switchTab('collection')">Collection</button>
    </div>

    <button id="goBtn" onclick="runActiveScan()">Run Live Scan</button>
    <div id="logContainer" style="display:none;"></div>

    <!-- TAB 1: Deals (existing functionality) -->
    <div class="tab-content active" id="tab-deals">
      <div id="dealsResults">
        <h2>Buy It Now - Best Deals <span class="count-badge" id="binCount">0</span></h2>
        <div class="table-wrap"><table id="binTable">
          <thead>
            <tr><th>Have</th><th>Card</th><th>Price</th><th>Market Price</th><th>Difference</th><th>% Over Market</th><th>Location</th><th>eBay</th><th>PriceCharting</th></tr>
          </thead>
          <tbody></tbody>
        </table></div>
        <h2>Auctions - Best Deals <span class="count-badge" id="auctionCount">0</span></h2>
        <div class="table-wrap"><table id="auctionTable">
          <thead>
            <tr><th>Have</th><th>Card</th><th>Current Bid</th><th>Market Price</th><th>Difference</th><th>% Over Market</th><th>Location</th><th>eBay</th><th>PriceCharting</th></tr>
          </thead>
          <tbody></tbody>
        </table></div>
      </div>
    </div>

    <!-- TAB 3: Collection -->
    <div class="tab-content" id="tab-collection">
      <div id="collectionContainer"></div>
    </div>

    <!-- TAB 2: Market Prices -->
    <div class="tab-content" id="tab-market">
      <p class="subtitle" id="marketLastUpdate"></p>
      <div class="table-wrap"><table id="marketTable">
        <thead>
          <tr><th>Have</th><th>#</th><th>Card</th><th>Type</th><th>PSA 10 Price</th><th>Ungraded Price</th><th>PriceCharting</th></tr>
        </thead>
        <tbody></tbody>
      </table></div>
    </div>

  </div>

  <script>
    // Tab switching
    const TABS = ['deals','market','collection'];
    let activeTab = 'deals';
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', TABS[i] === tab);
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');

      if (tab === 'market') loadMarketPrices();
      if (tab === 'collection') renderCollection();
    }

    function runActiveScan() {
      if (activeTab === 'deals') return startScan();
      if (activeTab === 'market') return triggerTabScan('/api/trigger-market', '/api/market-prices', loadMarketPrices);
    }

    async function triggerTabScan(triggerUrl, statusUrl, reloader) {
      const btn = document.getElementById('goBtn');
      btn.disabled = true;
      btn.textContent = 'Scanning...';
      try {
        await fetch(triggerUrl, { method: 'POST' });
        const poll = setInterval(async () => {
          try {
            const r = await fetch(statusUrl);
            const d = await r.json();
            if (!d.inProgress) {
              clearInterval(poll);
              btn.disabled = false;
              btn.textContent = 'Run Live Scan';
              reloader();
            }
          } catch {}
        }, 5000);
      } catch {
        btn.disabled = false;
        btn.textContent = 'Run Live Scan';
      }
    }

    // ===== CHECKBOX PERSISTENCE =====
    function getOwnedSet(key) {
      try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
      catch { return new Set(); }
    }
    function saveOwnedSet(key, set) {
      localStorage.setItem(key, JSON.stringify([...set]));
    }
    function toggleOwned(key, id, rerender) {
      const s = getOwnedSet(key);
      if (s.has(id)) s.delete(id); else s.add(id);
      saveOwnedSet(key, s);
      rerender();
    }

    function getTime() {
      return new Date().toLocaleTimeString('en-US', { hour12: false });
    }

    function addLog(msg, type = 'info') {
      const container = document.getElementById('logContainer');
      container.style.display = 'block';
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="log-time">[${getTime()}]</span>${msg}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
    }

    // ===== DEALS TAB =====
    async function startScan() {
      const btn = document.getElementById('goBtn');
      btn.disabled = true;
      btn.textContent = 'Scanning...';
      document.getElementById('lastScanInfo').textContent = 'Scan in progress...';

      try {
        const resp = await fetch('/api/trigger-scan', { method: 'POST' });
        const data = await resp.json();
        if (data.status === 'already_running') {
          document.getElementById('lastScanInfo').textContent = 'Scan already in progress...';
        }
        // Poll for completion
        const poll = setInterval(async () => {
          const r = await fetch('/api/cached-results');
          const d = await r.json();
          if (!d.scanInProgress) {
            clearInterval(poll);
            btn.disabled = false;
            btn.textContent = 'Run Live Scan';
            if (d.results) {
              document.getElementById('binCount').textContent = d.results.buyItNow.length;
              document.getElementById('auctionCount').textContent = d.results.auctions.length;
              renderDealTable('#binTable tbody', d.results.buyItNow);
              renderDealTable('#auctionTable tbody', d.results.auctions);
            }
            if (d.lastScanTime) {
              document.getElementById('lastScanInfo').textContent =
                'Last scan: ' + new Date(d.lastScanTime).toLocaleString() + ' — auto-refreshes hourly';
            }
          }
        }, 5000);
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Run Live Scan';
      }
    }

    async function loadCached() {
      try {
        const resp = await fetch('/api/cached-results');
        const data = await resp.json();
        if (data.scanInProgress && activeTab === 'deals') {
          const btn = document.getElementById('goBtn');
          btn.disabled = true;
          btn.textContent = 'Scanning...';
          document.getElementById('lastScanInfo').textContent =
            (data.lastScanTime ? 'Last scan: ' + new Date(data.lastScanTime).toLocaleString() + ' — ' : '') + 'Scanning...';
        } else if (data.lastScanTime) {
          const t = new Date(data.lastScanTime);
          const src = data.priceSource === 'fallback' ? ' (fallback prices)' : ' (live PriceCharting)';
          document.getElementById('lastScanInfo').textContent =
            'Last scan: ' + t.toLocaleString() + ' — auto-refreshes hourly' + src;
          if (activeTab === 'deals') {
            const btn = document.getElementById('goBtn');
            btn.disabled = false;
            btn.textContent = 'Run Live Scan';
          }
        }
        if (data.results) {
          document.getElementById('binCount').textContent = data.results.buyItNow.length;
          document.getElementById('auctionCount').textContent = data.results.auctions.length;
          renderDealTable('#binTable tbody', data.results.buyItNow);
          renderDealTable('#auctionTable tbody', data.results.auctions);
        } else if (data.scanInProgress && !data.results) {
          document.getElementById('lastScanInfo').textContent = 'First scan in progress... refresh in a minute.';
        }
      } catch {}
    }
    loadCached();
    setInterval(loadCached, 5 * 60 * 1000);

    const isMobile = () => window.innerWidth <= 768;
    function shortLoc(loc) {
      if (!loc) return '—';
      const l = loc.toLowerCase();
      if (l.includes('united states')) return 'US';
      if (l.includes('canada')) return 'CA';
      if (l.includes('united kingdom')) return 'UK';
      if (l.includes('australia')) return 'AU';
      if (l.includes('japan')) return 'JP';
      if (l.includes('france')) return 'FR';
      if (l.includes('germany')) return 'DE';
      return loc.substring(0, 2).toUpperCase();
    }

    const _dealTableCache = {};
    function renderDealTable(selector, items) {
      if (items) _dealTableCache[selector] = items;
      const cached = _dealTableCache[selector] || [];
      const tbody = document.querySelector(selector);
      if (!cached.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">No items found</td></tr>';
        return;
      }
      const owned = getOwnedSet('owned_cards');
      const sorted = cached.slice().sort((a, b) => {
        const ao = owned.has(a.name) ? 1 : 0;
        const bo = owned.has(b.name) ? 1 : 0;
        return ao - bo;
      });
      let html = '';
      for (const item of sorted) {
        const diffClass = item.difference != null ? (item.difference < 0 ? 'negative' : 'positive') : '';
        const diffText = item.difference != null
          ? (item.difference < 0 ? '-$' + Math.abs(item.difference).toFixed(2) : '+$' + item.difference.toFixed(2))
          : 'N/A';
        const mp = item.marketPrice != null ? '$' + item.marketPrice.toFixed(2) : 'N/A';
        const badge = item.verified !== false
          ? '<span class="badge badge-verified">Verified</span>'
          : '<span class="badge badge-unverified">Unverified</span>';
        const pcLink = item.pricechartingUrl
          ? `<a href="${item.pricechartingUrl}" target="_blank">View</a>` : 'N/A';
        const pctClass = item.pctOverMarket != null ? (item.pctOverMarket < 0 ? 'negative' : 'positive') : '';
        const pctText = item.pctOverMarket != null
          ? (item.pctOverMarket < 0 ? item.pctOverMarket.toFixed(1) + '%' : '+' + item.pctOverMarket.toFixed(1) + '%')
          : 'N/A';
        const isOwned = owned.has(item.name);
        const checked = isOwned ? 'checked' : '';
        const rowStyle = isOwned ? 'opacity:0.5;' : '';
        const safeName = item.name.replace(/'/g, "\\'");
        html += `<tr style="${rowStyle}">
          <td><input type="checkbox" ${checked} onchange="toggleOwnedCard('${safeName}')"></td>
          <td data-label="Card">${item.name}${badge}</td>
          <td data-label="Price" class="price">$${item.price.toFixed(2)}</td>
          <td data-label="Market">${mp}</td>
          <td data-label="Diff" class="${diffClass}">${diffText}</td>
          <td data-label="% Over" class="${pctClass}">${pctText}</td>
          <td data-label="Location">${isMobile() ? shortLoc(item.location) : (item.location ? item.location.replace(/\b\w/g, c => c.toUpperCase()) : '—')}</td>
          <td data-label="eBay"><a href="${item.ebayUrl}" target="_blank">View</a></td>
          <td data-label="PC">${pcLink}</td>
        </tr>`;
      }
      tbody.innerHTML = html;
    }

    function toggleOwnedCard(name) {
      const s = getOwnedSet('owned_cards');
      if (s.has(name)) s.delete(name); else s.add(name);
      saveOwnedSet('owned_cards', s);
      // Re-render all deal tables and market prices
      for (const sel of Object.keys(_dealTableCache)) renderDealTable(sel);
      if (_marketData) renderMarketPrices();
    }

    // ===== ENDING AUCTIONS TAB =====
    async function loadEndingAuctions(forceRefresh) {
      const tbody = document.querySelector('#endingAuctionsTable tbody');
      const loading = document.getElementById('endingAuctionsLoading');
      loading.style.display = 'block';
      tbody.innerHTML = '';

      try {
        const resp = await fetch('/api/ending-auctions' + (forceRefresh ? '?refresh=1' : ''));
        const data = await resp.json();
        loading.style.display = 'none';

        if (data.lastUpdate) {
          document.getElementById('auctionLastUpdate').textContent = 'Last fetched: ' + new Date(data.lastUpdate).toLocaleString();
        }

        if (!data.auctions || !data.auctions.length) {
          tbody.innerHTML = '<tr><td colspan="10" class="empty">No PSA 10 auctions found in the next 24 hours</td></tr>';
          return;
        }

        let html = '';
        for (const item of data.auctions) {
          const savings = item.difference != null ? Math.abs(item.difference).toFixed(2) : null;
          const savingsText = savings != null
            ? (item.difference < 0 ? '<span class="negative">$' + savings + ' below</span>' : '<span class="positive">$' + savings + ' above</span>')
            : 'N/A';
          const mp = item.marketPrice != null ? '$' + item.marketPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : 'N/A';
          const pctClass = item.pctOverMarket != null ? (item.pctOverMarket < 0 ? 'negative' : 'positive') : '';
          const pctText = item.pctOverMarket != null
            ? (item.pctOverMarket < 0 ? item.pctOverMarket.toFixed(1) + '%' : '+' + item.pctOverMarket.toFixed(1) + '%')
            : 'N/A';
          const timeClass = item.minutesLeft <= 10 ? 'time-urgent' : item.minutesLeft <= 30 ? 'time-warn' : '';
          const hotBadge = item.difference != null && item.difference < -50 ? '<span class="badge badge-hot">HOT</span>' : '';
          const pcLink = item.pricechartingUrl
            ? `<a href="${item.pricechartingUrl}" target="_blank">View</a>` : '—';

          html += `<tr>
            <td>${item.name}${hotBadge}</td>
            <td class="price">$${item.price.toFixed(2)}</td>
            <td>${mp}</td>
            <td>${savingsText}</td>
            <td class="${pctClass}">${pctText}</td>
            <td class="${timeClass}">${item.timeLeftStr || item.minutesLeft + 'm'}</td>
            <td>${item.endTime} PT</td>
            <td>${item.location ? item.location.replace(/\b\w/g, c => c.toUpperCase()) : '—'}</td>
            <td><a href="${item.ebayUrl}" target="_blank">View</a></td>
            <td>${pcLink}</td>
          </tr>`;
        }
        tbody.innerHTML = html;
      } catch (e) {
        loading.style.display = 'none';
        tbody.innerHTML = '<tr><td colspan="10" class="empty">Error loading auctions: ' + e.message + '</td></tr>';
      }
    }

    // ===== MARKET PRICES TAB =====
    let _marketData = null;
    async function loadMarketPrices() {
      const tbody = document.querySelector('#marketTable tbody');
      try {
        const resp = await fetch('/api/market-prices');
        const data = await resp.json();
        _marketData = data;

        if (data.lastUpdate) {
          const src = data.priceSource === 'fallback' ? ' (fallback prices)' : ' (live PriceCharting)';
          document.getElementById('marketLastUpdate').textContent =
            'Last updated: ' + new Date(data.lastUpdate).toLocaleString() + src;
        }

        if (!data.prices || !data.prices.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty">Market prices loading... check back in a few minutes.</td></tr>';
          return;
        }

        // Calculate total PSA 10 value
        let totalPsa10 = 0;
        let totalUngraded = 0;
        let pricedCount = 0;
        for (const card of data.prices) {
          if (card.psa10Price) { totalPsa10 += card.psa10Price; pricedCount++; }
          if (card.ungradedPrice) totalUngraded += card.ungradedPrice;
        }
        document.getElementById('marketLastUpdate').innerHTML =
          (data.lastUpdate ? 'Last updated: ' + new Date(data.lastUpdate).toLocaleString() + '<br>' : '') +
          '<strong>Total PSA 10 Set Value: $' + totalPsa10.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) +
          '</strong> (' + pricedCount + '/102 priced) &nbsp;|&nbsp; Total Ungraded: $' + totalUngraded.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        renderMarketPrices();
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Error: ' + e.message + '</td></tr>';
      }
    }

    function renderMarketPrices() {
      const tbody = document.querySelector('#marketTable tbody');
      if (!_marketData || !_marketData.prices) return;
      const owned = getOwnedSet('owned_cards');
      const cards = _marketData.prices.slice().sort((a, b) => {
        const ao = owned.has(a.name) ? 1 : 0;
        const bo = owned.has(b.name) ? 1 : 0;
        if (ao !== bo) return ao - bo;
        return a.number - b.number;
      });
      let html = '';
      for (const card of cards) {
        const typeBadge = card.type === 'Holo Rare' ? '<span class="badge badge-holo">Holo</span>'
          : card.type === 'Rare' ? '<span class="badge badge-rare">Rare</span>'
          : card.type === 'Trainer' ? '<span class="badge badge-trainer">Trainer</span>'
          : card.type === 'Energy' ? '<span class="badge badge-energy">Energy</span>'
          : '<span class="badge badge-common">C/UC</span>';
        const psa10 = card.psa10Price != null ? '$' + card.psa10Price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : 'N/A';
        const ungraded = card.ungradedPrice != null ? '$' + card.ungradedPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : 'N/A';
        const pcLink = card.pricechartingUrl
          ? `<a href="${card.pricechartingUrl}" target="_blank">View</a>` : 'N/A';
        const checked = owned.has(card.name) ? 'checked' : '';
        const rowStyle = owned.has(card.name) ? 'opacity:0.5;' : '';
        const safeName = card.name.replace(/'/g, "\\'");
        html += `<tr style="${rowStyle}">
          <td><input type="checkbox" ${checked} onchange="toggleOwnedCard('${safeName}')"></td>
          <td data-label="#">${card.number}</td>
          <td data-label="Card">${card.name} ${typeBadge}</td>
          <td data-label="Type">${card.type}</td>
          <td data-label="PSA 10" class="price">${psa10}</td>
          <td data-label="Ungraded">${ungraded}</td>
          <td data-label="PC">${pcLink}</td>
        </tr>`;
      }
      tbody.innerHTML = html;
    }

    // ===== COLLECTION TAB =====
    // Price = average of last 5 completed auctions from PriceCharting
    // Raw cards use #completed-auctions-used; graded cards use #completed-auctions-graded
    const COLLECTION = [
      // Riley — Raw

    function money(v) {
      return v == null ? '—' : '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function renderCollection() {
      const container = document.getElementById('collectionContainer');
      const owners = ['Riley', 'Kenzie'];
      let html = '';
      for (const owner of owners) {
        const rows = COLLECTION.filter(c => c.who === owner);
        const totalPrice = rows.reduce((s, r) => s + (r.price || 0), 0);
        html += `<h2>${owner} <span class="count-badge">${rows.length}</span></h2>`;
        html += `<p class="subtitle" style="text-align:left;margin-bottom:10px;">
          <strong>Total Value:</strong> ${money(totalPrice)}
        </p>`;
        html += `<div class="table-wrap"><table>
          <thead><tr>
            <th>Pokemon</th><th>PSA</th><th>#</th><th>Card</th><th>Type</th>
            <th>Number</th><th>Pack</th><th>Year</th><th>Price</th><th>PriceCharting</th>
          </tr></thead><tbody>`;
        for (const r of rows) {
          const pcLink = r.pc ? `<a href="${r.pc}" target="_blank">View</a>` : '—';
          html += `<tr>
            <td>${r.pokemon}</td>
            <td>${r.psa}</td>
            <td>${r.cert}</td>
            <td>${r.card}</td>
            <td>${r.type}</td>
            <td>${r.number}</td>
            <td>${r.pack}</td>
            <td>${r.year}</td>
            <td class="price">${money(r.price)}${r.note ? ` <span style="color:#fb923c;font-size:0.7rem;font-weight:400;">(${r.note})</span>` : ''}</td>
            <td>${pcLink}</td>
          </tr>`;
        }
        html += `</tbody></table></div>`;
      }
      container.innerHTML = html;
